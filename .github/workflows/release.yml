name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: cogito-release-main
  cancel-in-progress: false

jobs:
  api-version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      previous-tag: ${{ steps.version.outputs.previous-tag }}
      release-required: ${{ steps.version.outputs.release-required }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
      - id: version
        uses: crmagz/forge/.github/actions/semantic-version@releases/v1
        with:
          tag-prefix: api/
          pathspecs: |
            services/api
            .python-version

  api-publish:
    needs: api-version
    if: needs.api-version.outputs.release-required == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
      - name: Build and publish API image
        run: |
          docker buildx build services/api \
            --file services/api/Dockerfile \
            --platform linux/amd64,linux/arm64 \
            --tag ghcr.io/${{ github.repository_owner }}/cogito-api:v${{ needs.api-version.outputs.version }} \
            --tag ghcr.io/${{ github.repository_owner }}/cogito-api:latest \
            --build-arg VERSION=${{ needs.api-version.outputs.version }} \
            --build-arg REVISION=${{ github.sha }} \
            --build-arg SOURCE=https://github.com/${{ github.repository }} \
            --cache-from type=registry,ref=ghcr.io/${{ github.repository_owner }}/cogito-api:buildcache \
            --cache-to type=registry,ref=ghcr.io/${{ github.repository_owner }}/cogito-api:buildcache,mode=max \
            --provenance mode=max \
            --sbom=true \
            --push

  api-release:
    needs: [api-version, api-publish]
    if: needs.api-version.outputs.release-required == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
      - uses: crmagz/forge/.github/actions/release@releases/v1
        with:
          version: ${{ needs.api-version.outputs.version }}
          tag-prefix: api/
          previous-tag: ${{ needs.api-version.outputs.previous-tag }}
          pathspecs: |
            services/api
            .python-version
          token: ${{ secrets.GITHUB_TOKEN }}

  worker-version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      previous-tag: ${{ steps.version.outputs.previous-tag }}
      release-required: ${{ steps.version.outputs.release-required }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
      - id: version
        uses: crmagz/forge/.github/actions/semantic-version@releases/v1
        with:
          tag-prefix: worker/
          pathspecs: |
            services/worker
            .python-version

  worker-publish:
    needs: worker-version
    if: needs.worker-version.outputs.release-required == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
      - name: Build and publish worker image
        run: |
          docker buildx build services/worker \
            --file services/worker/Dockerfile \
            --platform linux/amd64,linux/arm64 \
            --tag ghcr.io/${{ github.repository_owner }}/cogito-worker:v${{ needs.worker-version.outputs.version }} \
            --tag ghcr.io/${{ github.repository_owner }}/cogito-worker:latest \
            --build-arg VERSION=${{ needs.worker-version.outputs.version }} \
            --build-arg REVISION=${{ github.sha }} \
            --build-arg SOURCE=https://github.com/${{ github.repository }} \
            --cache-from type=registry,ref=ghcr.io/${{ github.repository_owner }}/cogito-worker:buildcache \
            --cache-to type=registry,ref=ghcr.io/${{ github.repository_owner }}/cogito-worker:buildcache,mode=max \
            --provenance mode=max \
            --sbom=true \
            --push

  worker-release:
    needs: [worker-version, worker-publish]
    if: needs.worker-version.outputs.release-required == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
      - uses: crmagz/forge/.github/actions/release@releases/v1
        with:
          version: ${{ needs.worker-version.outputs.version }}
          tag-prefix: worker/
          previous-tag: ${{ needs.worker-version.outputs.previous-tag }}
          pathspecs: |
            services/worker
            .python-version
          token: ${{ secrets.GITHUB_TOKEN }}

  chart-version:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      previous-tag: ${{ steps.version.outputs.previous-tag }}
      release-required: ${{ steps.version.outputs.release-required }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
      - id: version
        uses: crmagz/forge/.github/actions/semantic-version@releases/v1
        with:
          tag-prefix: chart/
          pathspecs: |
            charts

  chart-publish:
    needs: chart-version
    if: needs.chart-version.outputs.release-required == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310
      - name: Configure chart repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add temporal https://go.temporal.io/helm-charts
          helm repo add minio https://charts.min.io/
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin
      - name: Package and publish chart
        env:
          VERSION: ${{ needs.chart-version.outputs.version }}
        run: |
          helm dependency build charts
          mkdir -p .release
          helm package charts --destination .release --version "$VERSION" --app-version "$VERSION"
          helm push ".release/cogito-${VERSION}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/charts"

  chart-release:
    needs: [chart-version, chart-publish]
    if: needs.chart-version.outputs.release-required == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
      - uses: crmagz/forge/.github/actions/release@releases/v1
        with:
          version: ${{ needs.chart-version.outputs.version }}
          tag-prefix: chart/
          previous-tag: ${{ needs.chart-version.outputs.previous-tag }}
          pathspecs: |
            charts
          token: ${{ secrets.GITHUB_TOKEN }}
