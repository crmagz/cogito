{{- if .Values.litellm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-litellm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.litellm.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/litellm-configmap.yaml") . | sha256sum }}
    spec:
      {{- if .Values.litellm.serviceAccount.create }}
      serviceAccountName: {{ .Values.litellm.serviceAccount.name | default (printf "%s-litellm" .Release.Name) }}
      {{- end }}
      containers:
        - name: litellm
          image: "{{ include "cogito.image" (dict "root" . "image" .Values.litellm.image) }}"
          imagePullPolicy: {{ .Values.litellm.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - >-
              export DATABASE_URL="postgresql://{{ .Values.litellm.database.user }}:$(DB_PASSWORD)@{{ .Values.litellm.database.host }}:{{ .Values.litellm.database.port }}/{{ .Values.litellm.database.name }}" &&
              exec litellm --config /etc/litellm/config.yaml --port 4000
          ports:
            - name: http
              containerPort: 4000
          envFrom:
            - secretRef:
                name: {{ .Values.litellm.existingSecret }}
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.litellm.database.existingSecret }}
                  key: {{ .Values.litellm.database.secretKey }}
          volumeMounts:
            - name: config
              mountPath: /etc/litellm
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: http
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.litellm.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-litellm-config
{{- end }}
