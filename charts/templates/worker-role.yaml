{{- if .Values.worker.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-worker-execution-jobs
  namespace: {{ .Values.worker.execution.namespace }}
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-worker-execution-jobs
  namespace: {{ .Values.worker.execution.namespace }}
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/instance: {{ .Release.Name }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.worker.serviceAccount.name | default (printf "%s-worker" .Release.Name) }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-worker-execution-jobs
{{- end }}
