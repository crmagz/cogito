{{- if .Values.api.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-supervisor-migrate
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: supervisor-migration
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/component: supervisor-migration
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: "{{ include "cogito.image" (dict "root" . "image" .Values.api.image) }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command: ["/bin/sh", "-ec", "python -m cogito_api.database_bootstrap && alembic upgrade head"]
          env:
            - name: COGITO_SUPERVISOR_DATABASE_HOST
              value: {{ .Values.api.supervisorDatabase.host | quote }}
            - name: COGITO_SUPERVISOR_DATABASE_PORT
              value: {{ .Values.api.supervisorDatabase.port | quote }}
            - name: COGITO_SUPERVISOR_DATABASE_NAME
              value: {{ .Values.api.supervisorDatabase.name | quote }}
            - name: COGITO_SUPERVISOR_DATABASE_USER
              value: {{ .Values.api.supervisorDatabase.user | quote }}
            - name: COGITO_SUPERVISOR_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.supervisorDatabase.existingSecret }}
                  key: {{ .Values.api.supervisorDatabase.passwordKey }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
{{- end }}
