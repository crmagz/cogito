{{- if .Values.api.enabled }}
{{- $supervisorDatabase := default (dict) .Values.api.supervisorDatabase }}
{{- $planner := default (dict) .Values.api.planner }}
{{- $auth := default (dict) .Values.api.auth }}
{{- $staticAuth := default (dict) $auth.static }}
{{- $oidcAuth := default (dict) $auth.oidc }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-api-config
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  MINIO_ENDPOINT: {{ .Values.api.objectStore.endpoint | quote }}
  MINIO_SECURE: {{ .Values.api.objectStore.secure | quote }}
  MINIO_PLANS_BUCKET: {{ .Values.api.objectStore.bucket | quote }}
  MINIO_PLAN_SNAPSHOTS_BUCKET: {{ .Values.api.objectStore.planSnapshotsBucket | quote }}
  MINIO_PLAN_SNAPSHOT_RETENTION_DAYS: {{ .Values.api.objectStore.planSnapshotRetentionDays | quote }}
  COGITO_MAX_WALL_CLOCK_MINUTES: {{ .Values.api.constraints.maxWallClockMinutes | quote }}
  COGITO_MAX_COST_USD: {{ .Values.api.constraints.maxCostUsd | quote }}
  COGITO_MAX_REVIEW_ROUNDS: {{ .Values.api.constraints.maxReviewRounds | quote }}
  COGITO_MAX_TURNS_PER_PHASE: {{ .Values.api.constraints.maxTurnsPerPhase | quote }}
  COGITO_TEMPORAL_HOST: {{ .Values.api.temporal.host | quote }}
  COGITO_TEMPORAL_NAMESPACE: {{ .Values.api.temporal.namespace | quote }}
  COGITO_TEMPORAL_TASK_QUEUE: {{ .Values.api.temporal.taskQueue | quote }}
  COGITO_ALLOWED_GIT_HOSTS: {{ toJson .Values.repositoryPolicy.allowedGitHosts | quote }}
  COGITO_SUPERVISOR_DATABASE_HOST: {{ default (printf "%s-postgresql" .Release.Name) $supervisorDatabase.host | quote }}
  COGITO_SUPERVISOR_DATABASE_PORT: {{ default 5432 $supervisorDatabase.port | quote }}
  COGITO_SUPERVISOR_DATABASE_NAME: {{ default "cogito" $supervisorDatabase.name | quote }}
  COGITO_SUPERVISOR_DATABASE_USER: {{ default "postgres" $supervisorDatabase.user | quote }}
  COGITO_LITELLM_ENDPOINT: {{ default (printf "http://%s-litellm:4000" .Release.Name) $planner.endpoint | quote }}
  COGITO_LITELLM_PLANNER_MODEL: {{ default "balanced" $planner.model | quote }}
  COGITO_LITELLM_PLANNER_TIMEOUT_SECONDS: {{ default 60 $planner.timeoutSeconds | quote }}
  COGITO_AUTH_MODE: {{ default "static" $auth.mode | quote }}
  COGITO_AUTH_STATIC_SUBJECT: {{ default "local-operator" $staticAuth.subject | quote }}
  COGITO_AUTH_OIDC_ISSUER: {{ default "" $oidcAuth.issuer | quote }}
  COGITO_AUTH_OIDC_AUDIENCE: {{ default "" $oidcAuth.audience | quote }}
  COGITO_AUTH_OIDC_JWKS_URL: {{ default "" $oidcAuth.jwksUrl | quote }}
  COGITO_AUTH_OIDC_ROLE_CLAIM: {{ default "roles" $oidcAuth.roleClaim | quote }}
  COGITO_AUTH_OIDC_APPROVAL_ROLE: {{ default "cogito-approver" $oidcAuth.approvalRole | quote }}
{{- end }}
