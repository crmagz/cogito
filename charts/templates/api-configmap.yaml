{{- if .Values.api.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-api-config
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  MINIO_ENDPOINT: {{ .Values.api.objectStore.endpoint | quote }}
  MINIO_SECURE: {{ .Values.api.objectStore.secure | quote }}
  MINIO_PLANS_BUCKET: {{ .Values.api.objectStore.bucket | quote }}
  MINIO_PLAN_SNAPSHOTS_BUCKET: {{ .Values.api.objectStore.planSnapshotsBucket | quote }}
  MINIO_PLAN_SNAPSHOT_RETENTION_DAYS: {{ .Values.api.objectStore.planSnapshotRetentionDays | quote }}
  COGITO_MAX_WALL_CLOCK_MINUTES: {{ .Values.api.constraints.maxWallClockMinutes | quote }}
  COGITO_MAX_COST_USD: {{ .Values.api.constraints.maxCostUsd | quote }}
  COGITO_MAX_REVIEW_ROUNDS: {{ .Values.api.constraints.maxReviewRounds | quote }}
  COGITO_MAX_TURNS_PER_PHASE: {{ .Values.api.constraints.maxTurnsPerPhase | quote }}
  COGITO_TEMPORAL_HOST: {{ .Values.api.temporal.host | quote }}
  COGITO_TEMPORAL_NAMESPACE: {{ .Values.api.temporal.namespace | quote }}
  COGITO_TEMPORAL_TASK_QUEUE: {{ .Values.api.temporal.taskQueue | quote }}
  COGITO_ALLOWED_GIT_HOSTS: {{ toJson .Values.repositoryPolicy.allowedGitHosts | quote }}
  COGITO_SUPERVISOR_DATABASE_HOST: {{ .Values.api.supervisorDatabase.host | quote }}
  COGITO_SUPERVISOR_DATABASE_PORT: {{ .Values.api.supervisorDatabase.port | quote }}
  COGITO_SUPERVISOR_DATABASE_NAME: {{ .Values.api.supervisorDatabase.name | quote }}
  COGITO_SUPERVISOR_DATABASE_USER: {{ .Values.api.supervisorDatabase.user | quote }}
  COGITO_LITELLM_ENDPOINT: {{ .Values.api.planner.endpoint | quote }}
  COGITO_LITELLM_PLANNER_MODEL: {{ .Values.api.planner.model | quote }}
  COGITO_LITELLM_PLANNER_TIMEOUT_SECONDS: {{ .Values.api.planner.timeoutSeconds | quote }}
  COGITO_AUTH_MODE: {{ .Values.api.auth.mode | quote }}
  COGITO_AUTH_STATIC_SUBJECT: {{ .Values.api.auth.static.subject | quote }}
  COGITO_AUTH_OIDC_ISSUER: {{ .Values.api.auth.oidc.issuer | quote }}
  COGITO_AUTH_OIDC_AUDIENCE: {{ .Values.api.auth.oidc.audience | quote }}
  COGITO_AUTH_OIDC_JWKS_URL: {{ .Values.api.auth.oidc.jwksUrl | quote }}
  COGITO_AUTH_OIDC_ROLE_CLAIM: {{ .Values.api.auth.oidc.roleClaim | quote }}
  COGITO_AUTH_OIDC_APPROVAL_ROLE: {{ .Values.api.auth.oidc.approvalRole | quote }}
{{- end }}
