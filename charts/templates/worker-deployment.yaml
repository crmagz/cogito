{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/worker-configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ .Values.worker.serviceAccount.name | default (printf "%s-worker" .Release.Name) }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: "{{ include "cogito.image" (dict "root" . "image" .Values.worker.image) }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-worker-config
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.worker.objectStore.existingSecret }}
                  key: {{ .Values.worker.objectStore.accessKeySecretKey }}
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.worker.objectStore.existingSecret }}
                  key: {{ .Values.worker.objectStore.secretKeySecretKey }}
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: COGITO_EXECUTION_LITELLM_MANAGEMENT_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.worker.execution.keyManagement.existingSecret }}
                  key: {{ .Values.worker.execution.keyManagement.apiKeyKey }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
{{- end }}
