{{- if .Values.api.enabled }}
{{- $supervisorDatabase := default (dict) .Values.api.supervisorDatabase }}
{{- $planner := default (dict) .Values.api.planner }}
{{- $rolePolicies := required "litellm.rolePolicies must define planner, developer, and reviewer policies" .Values.litellm.rolePolicies }}
{{- $plannerRole := required "litellm.rolePolicies.planner is required" $rolePolicies.planner }}
{{- $auth := default (dict) .Values.api.auth }}
{{- $staticAuth := default (dict) $auth.static }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: api
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/api-configmap.yaml") . | sha256sum }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "{{ include "cogito.image" (dict "root" . "image" .Values.api.image) }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-api-config
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.objectStore.existingSecret }}
                  key: {{ .Values.api.objectStore.accessKeySecretKey }}
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.objectStore.existingSecret }}
                  key: {{ .Values.api.objectStore.secretKeySecretKey }}
            - name: COGITO_SUPERVISOR_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ default "cogito-postgresql" $supervisorDatabase.existingSecret }}
                  key: {{ default "postgres-password" $supervisorDatabase.passwordKey }}
            - name: COGITO_LITELLM_PLANNER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ required "litellm.rolePolicies.planner.existingSecret is required" $plannerRole.existingSecret }}
                  key: {{ required "litellm.rolePolicies.planner.apiKeyKey is required" $plannerRole.apiKeyKey }}
            {{- if eq (default "static" $auth.mode) "static" }}
            - name: COGITO_AUTH_STATIC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ default "cogito-operator-auth" $staticAuth.existingSecret }}
                  key: {{ default "token" $staticAuth.tokenKey }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
{{- end }}
