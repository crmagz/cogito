# Cogito - Production overrides
# Usage: helm upgrade --install cogito charts/ -f charts/values.yaml -f charts/values-production.yaml

global:
  # CI must inject the digest values below from the signed release manifest.
  production: true

# Disable in-cluster PostgreSQL, use RDS
postgresql:
  enabled: false

externalDatabase:
  enabled: true
  host: "cogito.xxxxxxxxxxxx.us-east-1.rds.amazonaws.com"
  port: 5432
  user: cogito
  password: ""
  existingSecret: cogito-rds-credentials
  secretKey: password

# Disable in-cluster MinIO, use S3
minio:
  enabled: false

externalObjectStore:
  enabled: true
  provider: s3
  region: us-east-1
  buckets:
    plans: cogito-plans
    # Provision this bucket with S3 Versioning and Compliance Object Lock before deploy.
    planSnapshots: cogito-plan-snapshots
    artifacts: cogito-artifacts
    specs: cogito-specs
  existingSecret: cogito-s3-credentials

# Production Temporal settings
temporal:
  server:
    replicaCount: 3
    config:
      persistence:
        datastores:
          default:
            sql:
              connectAddr: "cogito.xxxxxxxxxxxx.us-east-1.rds.amazonaws.com:5432"
              user: cogito
              password: ""
              existingSecret: cogito-rds-credentials
              secretKey: password
              createDatabase: false
              maxConns: 50
              maxIdleConns: 50
          visibility:
            sql:
              connectAddr: "cogito.xxxxxxxxxxxx.us-east-1.rds.amazonaws.com:5432"
              user: cogito
              password: ""
              existingSecret: cogito-rds-credentials
              secretKey: password
              createDatabase: false
              maxConns: 50
              maxIdleConns: 50
  web:
    replicaCount: 2
    ingress:
      enabled: true
      className: alb
      annotations:
        alb.ingress.kubernetes.io/scheme: internal
        alb.ingress.kubernetes.io/target-type: ip
      hosts:
        - "cogito.internal.example.com"
      tls:
        - secretName: cogito-tls
          hosts:
            - "cogito.internal.example.com"
  schema:
    useHelmHooks: true

# Production LiteLLM settings
litellm:
  replicaCount: 2
  existingSecret: cogito-litellm-credentials
  rolePolicies:
    planner:
      existingSecret: cogito-planner-key
    developer:
      existingSecret: cogito-developer-key
    reviewer:
      existingSecret: cogito-reviewer-key
  # IRSA: grants the litellm pod AWS credentials for the bedrock provider without static keys.
  # Requires an IAM role trusting this cluster's OIDC provider, scoped to bedrock:InvokeModel.
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::xxxxxxxxxxxx:role/cogito-litellm-bedrock"
  database:
    host: "cogito.xxxxxxxxxxxx.us-east-1.rds.amazonaws.com"
    user: cogito
    existingSecret: cogito-rds-credentials
    secretKey: password

# Production API settings
api:
  replicaCount: 2
  # Publish immutable release images before applying this file. These values must
  # never inherit the local-development image names from values.yaml.
  image:
    repository: ghcr.io/crmagz/cogito-api
    tag: "v0.1.0"
    digest: ""
    pullPolicy: IfNotPresent
  objectStore:
    endpoint: "s3.us-east-1.amazonaws.com"
    secure: true
    bucket: "cogito-plans"
    planSnapshotsBucket: "cogito-plan-snapshots"
    planSnapshotRetentionDays: 365
    existingSecret: cogito-s3-credentials
    accessKeySecretKey: access-key
    secretKeySecretKey: secret-key
  supervisorDatabase:
    host: "cogito.xxxxxxxxxxxx.us-east-1.rds.amazonaws.com"
    port: 5432
    name: cogito
    user: cogito
    existingSecret: cogito-rds-credentials
    passwordKey: password
  planner:
    endpoint: http://cogito-litellm:4000
    timeoutSeconds: 60
  auth:
    mode: oidc
    oidc:
      issuer: "https://issuer.example.com/"
      audience: cogito-api
      jwksUrl: "https://issuer.example.com/.well-known/jwks.json"
      roleClaim: roles
      approvalRole: cogito-approver

# Production worker settings
worker:
  replicaCount: 2
  image:
    repository: ghcr.io/crmagz/cogito-worker
    tag: "v0.1.0"
    digest: ""
    pullPolicy: IfNotPresent
  objectStore:
    endpoint: "s3.us-east-1.amazonaws.com"
    secure: true
    bucket: "cogito-plans"
    planSnapshotsBucket: "cogito-plan-snapshots"
    existingSecret: cogito-s3-credentials
    accessKeySecretKey: access-key
    secretKeySecretKey: secret-key
  specStore:
    bucket: cogito-specs
    prefix: specs
  execution:
    createNamespace: true
    keyManagement:
      existingSecret: cogito-developer-key-manager
      apiKeyKey: api-key
    specStore:
      endpoint: "s3.us-east-1.amazonaws.com"
      secure: true
      existingSecret: cogito-execution-spec-reader
      accessKeySecretKey: access-key
      secretKeySecretKey: secret-key
