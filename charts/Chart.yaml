apiVersion: v2
name: cogito
description: Agentic Development Platform - Specifications + Repositories + Plan = Reviewed PRs
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
  - name: postgresql
    version: 18.8.0
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled

  - name: temporal
    version: 1.6.0
    repository: https://go.temporal.io/helm-charts
    condition: temporal.enabled

  - name: minio
    version: 5.4.0
    repository: https://charts.min.io/
    condition: minio.enabled
