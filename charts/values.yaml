## Cogito - Agentic Development Platform
## Default values target local (kind) development.
## Override with values-production.yaml for AWS deployments.

## @section Database
## Configure the in-cluster PostgreSQL or an external database (e.g. RDS).
## Set `postgresql.enabled=false` and `externalDatabase.enabled=true` for production.

## @param postgresql.enabled Deploy in-cluster PostgreSQL
## @param postgresql.auth.postgresPassword Password for the postgres admin user
## @param postgresql.auth.database Default database created on init
##
postgresql:
  enabled: true
  auth:
    postgresPassword: cogito
    database: temporal
  ## @param postgresql.primary.resourcesPreset Override bitnami resource preset (set "none" to use custom resources)
  ## @param postgresql.primary.resources.requests.memory Memory request
  ## @param postgresql.primary.resources.requests.cpu CPU request
  ## @param postgresql.primary.resources.limits.memory Memory limit
  ## @param postgresql.primary.persistence.size PVC size for PostgreSQL data
  ##
  primary:
    resourcesPreset: none
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
    persistence:
      size: 2Gi
    ## @param postgresql.primary.initdb.scripts Init scripts executed on first boot
    ##
    initdb:
      scripts:
        create-visibility-db.sql: |
          CREATE DATABASE temporal_visibility;
        create-litellm-db.sql: |
          CREATE DATABASE litellm;

## @param externalDatabase.enabled Use an external database instead of the in-cluster PostgreSQL
## @param externalDatabase.host Hostname of the external database
## @param externalDatabase.port Port of the external database
## @param externalDatabase.user Username for the external database
## @param externalDatabase.password Password for the external database (ignored if existingSecret is set)
## @param externalDatabase.existingSecret Name of an existing Secret containing the database password
## @param externalDatabase.secretKey Key within the existing Secret that holds the password
##
externalDatabase:
  enabled: false
  host: ""
  port: 5432
  user: ""
  password: ""
  existingSecret: ""
  secretKey: password

## @section Object Storage
## Configure the in-cluster MinIO or an external object store (e.g. S3).
## Set `minio.enabled=false` and `externalObjectStore.enabled=true` for production.

## @param minio.enabled Deploy in-cluster MinIO
## @param minio.mode MinIO server mode
## @param minio.replicas Number of MinIO replicas
## @param minio.rootUser MinIO root username
## @param minio.rootPassword MinIO root password
## @param minio.persistence.enabled Enable persistent storage for MinIO
## @param minio.persistence.size PVC size for MinIO data
## @param minio.resources.requests.memory Memory request
##
minio:
  enabled: true
  mode: standalone
  replicas: 1
  rootUser: minioadmin
  rootPassword: minioadmin
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      memory: 256Mi
  ## @param minio.buckets Buckets to create on startup
  ##
  buckets:
    - name: plans
      policy: none
      purge: false
    - name: artifacts
      policy: none
      purge: false
  ## @param minio.service.type Kubernetes service type
  ## @param minio.service.port MinIO API port
  ##
  service:
    type: ClusterIP
    port: "9000"
  ## @param minio.consoleService.type Kubernetes service type for the MinIO console
  ## @param minio.consoleService.port MinIO console port
  ##
  consoleService:
    type: ClusterIP
    port: "9001"

## @param externalObjectStore.enabled Use an external object store instead of in-cluster MinIO
## @param externalObjectStore.provider Object store provider
## @param externalObjectStore.region Cloud region
## @param externalObjectStore.buckets.plans Bucket name for plans
## @param externalObjectStore.buckets.artifacts Bucket name for artifacts
## @param externalObjectStore.existingSecret Name of an existing Secret containing object store credentials
##
externalObjectStore:
  enabled: false
  provider: s3
  region: us-east-1
  buckets:
    plans: ""
    artifacts: ""
  existingSecret: ""

## @section Temporal
## Workflow orchestration engine.

## @param temporal.enabled Deploy Temporal
##
temporal:
  enabled: true
  ## @param temporal.server.replicaCount Number of Temporal server replicas per service
  ##
  server:
    replicaCount: 1
    ## @extra temporal.server.config.persistence Temporal persistence configuration
    ## @param temporal.server.config.persistence.numHistoryShards Number of history shards (immutable after first deploy)
    ##
    config:
      persistence:
        defaultStore: default
        visibilityStore: visibility
        numHistoryShards: 512
        datastores:
          ## @param temporal.server.config.persistence.datastores.default.sql.pluginName SQL plugin (postgres12 or mysql8)
          ## @param temporal.server.config.persistence.datastores.default.sql.driverName SQL driver
          ## @param temporal.server.config.persistence.datastores.default.sql.databaseName Database name for the default store
          ## @param temporal.server.config.persistence.datastores.default.sql.connectAddr Database address as host:port
          ## @param temporal.server.config.persistence.datastores.default.sql.user Database user
          ## @param temporal.server.config.persistence.datastores.default.sql.password Database password
          ## @param temporal.server.config.persistence.datastores.default.sql.maxConns Maximum open connections
          ## @param temporal.server.config.persistence.datastores.default.sql.maxIdleConns Maximum idle connections
          ## @param temporal.server.config.persistence.datastores.default.sql.maxConnLifetime Maximum connection lifetime
          ## @param temporal.server.config.persistence.datastores.default.sql.createDatabase Create the database if it does not exist
          ##
          default:
            sql:
              pluginName: postgres12
              driverName: postgres12
              databaseName: temporal
              connectAddr: "cogito-postgresql:5432"
              connectProtocol: tcp
              user: postgres
              password: cogito
              maxConns: 20
              maxIdleConns: 20
              maxConnLifetime: "1h"
              createDatabase: true
          ## @param temporal.server.config.persistence.datastores.visibility.sql.pluginName SQL plugin (postgres12 or mysql8)
          ## @param temporal.server.config.persistence.datastores.visibility.sql.driverName SQL driver
          ## @param temporal.server.config.persistence.datastores.visibility.sql.databaseName Database name for the visibility store
          ## @param temporal.server.config.persistence.datastores.visibility.sql.connectAddr Database address as host:port
          ## @param temporal.server.config.persistence.datastores.visibility.sql.user Database user
          ## @param temporal.server.config.persistence.datastores.visibility.sql.password Database password
          ## @param temporal.server.config.persistence.datastores.visibility.sql.maxConns Maximum open connections
          ## @param temporal.server.config.persistence.datastores.visibility.sql.maxIdleConns Maximum idle connections
          ## @param temporal.server.config.persistence.datastores.visibility.sql.maxConnLifetime Maximum connection lifetime
          ## @param temporal.server.config.persistence.datastores.visibility.sql.createDatabase Create the database if it does not exist
          ##
          visibility:
            sql:
              pluginName: postgres12
              driverName: postgres12
              databaseName: temporal_visibility
              connectAddr: "cogito-postgresql:5432"
              connectProtocol: tcp
              user: postgres
              password: cogito
              maxConns: 20
              maxIdleConns: 20
              maxConnLifetime: "1h"
              createDatabase: true
  ## @param temporal.web.enabled Deploy Temporal Web UI
  ## @param temporal.web.replicaCount Number of Web UI replicas
  ## @param temporal.web.service.type Kubernetes service type for the Web UI
  ## @param temporal.web.service.port Web UI port
  ##
  web:
    enabled: true
    replicaCount: 1
    service:
      type: ClusterIP
      port: 8080
    ## @param temporal.web.ingress.enabled Enable ingress for the Temporal Web UI
    ## @param temporal.web.ingress.className Ingress class name (e.g. alb, nginx)
    ## @param temporal.web.ingress.annotations [object] Ingress annotations
    ## @param temporal.web.ingress.hosts Ingress hostnames
    ## @param temporal.web.ingress.tls [array] Ingress TLS configuration
    ##
    ingress:
      enabled: false
      className: ""
      annotations: {}
      hosts:
        - "/"
      tls: []
  ## @param temporal.admintools.enabled Deploy Temporal admin tools
  ##
  admintools:
    enabled: true
  ## @param temporal.schema.useHelmHooks Use Helm hooks for schema setup (set false for umbrella charts)
  ##
  schema:
    useHelmHooks: false
  ## @param temporal.shims.dockerize Enable dockerize shim (set false for Temporal 1.30+)
  ## @param temporal.shims.elasticsearchTool Enable ES tool shim (set false for Temporal 1.30+)
  ##
  shims:
    dockerize: false
    elasticsearchTool: false

## @section LiteLLM
## OpenAI-compatible LLM gateway: per-tier model routing, virtual keys, and budget tracking.
## Provider API keys and the proxy master key are never set here — supply them via `litellm.existingSecret`.

## @param litellm.enabled Deploy the LiteLLM gateway
## @param litellm.replicaCount Number of LiteLLM replicas
## @param litellm.image.repository LiteLLM image (database-enabled variant, required for Postgres-backed virtual keys/budgets)
## @param litellm.image.tag LiteLLM image tag
## @param litellm.image.pullPolicy Image pull policy
## @param litellm.existingSecret Name of an existing Secret containing LITELLM_MASTER_KEY and one `<PROVIDER>_API_KEY` entry per provider referenced in litellm.tiers (e.g. ANTHROPIC_API_KEY). Not used for the `bedrock` provider, which authenticates via AWS credentials instead (see litellm.serviceAccount for IRSA, or inject AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY/AWS_REGION_NAME into this Secret for local dev). The chart never creates this Secret.
## @param litellm.serviceAccount.create Create a ServiceAccount for the LiteLLM pod (for IRSA when using the bedrock provider in production; leave false for local kind demos where AWS creds are injected via litellm.existingSecret instead)
## @param litellm.serviceAccount.name Name of the ServiceAccount to use or create. Defaults to the release's litellm name if empty.
## @param litellm.serviceAccount.annotations [object] Annotations for the ServiceAccount (e.g. eks.amazonaws.com/role-arn for IRSA)
##
litellm:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/berriai/litellm-database
    tag: v1.90.2
    pullPolicy: IfNotPresent
  existingSecret: cogito-litellm-secret
  serviceAccount:
    create: false
    name: ""
    annotations: {}
  ## @param litellm.service.type Kubernetes service type
  ## @param litellm.service.port Gateway port (OpenAI-compatible API)
  ##
  service:
    type: ClusterIP
    port: 4000
  ## @param litellm.resources.requests.memory Memory request
  ## @param litellm.resources.requests.cpu CPU request
  ## @param litellm.resources.limits.memory Memory limit
  ##
  resources:
    requests:
      memory: 512Mi
      cpu: 100m
    limits:
      memory: 2Gi
  ## @param litellm.database.name Database name for LiteLLM's virtual-key/budget store
  ## @param litellm.database.host Postgres host used to build the gateway's connection string
  ## @param litellm.database.port Postgres port used to build the gateway's connection string
  ## @param litellm.database.user Postgres user used to build the gateway's connection string
  ## @param litellm.database.existingSecret Name of an existing Secret containing the Postgres password (defaults to the in-cluster PostgreSQL's auto-generated Secret)
  ## @param litellm.database.secretKey Key within litellm.database.existingSecret that holds the password
  ##
  database:
    name: litellm
    host: cogito-postgresql
    port: 5432
    user: postgres
    existingSecret: cogito-postgresql
    secretKey: postgres-password
  ## @param litellm.tiers Model tiers exposed by the gateway. Each tier is a values-driven {provider, model} pair, so the backing model can be swapped without any template change. `provider` must be a LiteLLM provider prefix (e.g. anthropic, openai, bedrock) whose credential is supplied as `<PROVIDER>_API_KEY` in litellm.existingSecret — except `bedrock`, which uses AWS credentials (IRSA or AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY/AWS_REGION_NAME) instead of an API key.
  ##
  tiers:
    discovery:
      provider: anthropic
      model: claude-3-5-haiku-20241022
    balanced:
      provider: anthropic
      model: claude-sonnet-5
    complex:
      provider: anthropic
      model: claude-opus-4-8

## @section API
## Plan submission API: schema/DAG/constraint validation and plan storage in the object store.

## @param api.enabled Deploy the API service
## @param api.replicaCount Number of API replicas
## @param api.image.repository API image repository
## @param api.image.tag API image tag
## @param api.image.pullPolicy Image pull policy
##
api:
  enabled: true
  replicaCount: 1
  image:
    repository: cogito-api
    tag: local
    pullPolicy: IfNotPresent
  ## @param api.service.type Kubernetes service type
  ## @param api.service.port API port
  ##
  service:
    type: ClusterIP
    port: 8000
  ## @param api.resources.requests.memory Memory request
  ## @param api.resources.requests.cpu CPU request
  ## @param api.resources.limits.memory Memory limit
  ##
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
  ## @param api.objectStore.endpoint Object store endpoint (host:port, no scheme)
  ## @param api.objectStore.secure Use TLS for the object store connection
  ## @param api.objectStore.bucket Bucket used for plan storage
  ## @param api.objectStore.existingSecret Name of an existing Secret containing the object store credentials (defaults to the in-cluster MinIO's auto-generated root credentials Secret)
  ## @param api.objectStore.accessKeySecretKey Key within api.objectStore.existingSecret that holds the access key
  ## @param api.objectStore.secretKeySecretKey Key within api.objectStore.existingSecret that holds the secret key
  ##
  objectStore:
    endpoint: "cogito-minio:9000"
    secure: false
    bucket: "plans"
    existingSecret: cogito-minio
    accessKeySecretKey: rootUser
    secretKeySecretKey: rootPassword
  ## @param api.constraints.maxWallClockMinutes System-configured maximum for plan.constraints.max_wall_clock_minutes
  ## @param api.constraints.maxCostUsd System-configured maximum for plan.constraints.max_cost_usd
  ## @param api.constraints.maxReviewRounds System-configured maximum for plan.constraints.max_review_rounds
  ## @param api.constraints.maxTurnsPerPhase System-configured maximum for plan.constraints.max_turns_per_phase
  ##
  constraints:
    maxWallClockMinutes: 240
    maxCostUsd: 50
    maxReviewRounds: 10
    maxTurnsPerPhase: 500
